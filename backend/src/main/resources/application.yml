server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    whitelabel:
      enabled: false

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: ltss-backend
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD:${MYSQL_PASSWORD}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: "SET time_zone = '+00:00'"
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    clean-disabled: true
    validate-on-migrate: true
  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  jackson:
    time-zone: UTC
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLED:false}

ltss:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:}
    jwt:
      issuer: ${JWT_ISSUER:ltss-backend}
      secret: ${JWT_SECRET}
      access-token-lifetime: PT15M
    refresh-cookie:
      name: ltss_refresh_token
      secure: ${REFRESH_COOKIE_SECURE:true}
      same-site: Lax
      path: /api/v1/auth
  account:
    email:
      enabled: ${MAIL_ENABLED:false}
      from: ${MAIL_FROM:no-reply@ltss.local}
      frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
    verification-token-lifetime: PT24H
    refresh-token-lifetime: P7D
    security-token-lifetime: PT10M
    token-resend-delay: PT60S
    temporary-lock-duration: PT15M
    max-login-failures: 5

logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"
